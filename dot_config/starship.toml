# ABOUTME: Starship prompt: two-line left prompt, git/timing on the right,
# ABOUTME: palette-driven colors, and modules that render only when relevant.

# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Inserts a blank line between shell prompts
add_newline = false

# Give git/language modules enough time to render in larger repos.
command_timeout = 1000
scan_timeout = 300

# Line 1: where am I (dir + k8s/aws context). Line 2: env + input line.
# username/hostname/shlvl/jobs/sudo/status only render when they matter
# (SSH, nested shells, bg jobs, cached sudo creds, last command failed).
format = '$directory$kubernetes$aws$line_break$python$conda$nodejs$direnv$username$hostname$shlvl$jobs$sudo$status$character'

# Git on the right, slow-command duration and clock trailing it. The whole
# right side vanishes when the prompt goes transient (see .zshrc).
right_format = '$git_branch$git_status$git_state$cmd_duration$time'

# Module styles reference this palette; retheme the prompt in one place.
palette = 'main'

[palettes.main]
path = '#FCCE78'
host = 'bright-green'
context = 'cyan'
vcs = 'white'
muted = 'bright-black'
ok = 'green'
warn = 'yellow'
danger = 'red'

[character]
success_symbol = '[Ô×ť](bold ok)'
error_symbol = '[Ô×ť](bold danger)'

# Disable the package module, hiding it from the prompt completely
[package]
disabled = true

[directory]
format = '[\[$path\]]($style)[$read_only]($read_only_style)'
truncation_length = 10
truncate_to_repo = false
style = 'path'

# Symbol is a literal so the outer group only renders when a profile is
# active ÔÇö '$symbol' is always non-empty and would defeat the gating.
[aws]
format = '([\(Ôśü´ŞĆ  $profile( \[$duration\])\)]($style))'

[kubernetes]
symbol = ''
format = '[\($symbol($context):($namespace)\)]($style)'
disabled = false
style = 'context'

# Guardrail: production contexts are impossible to miss, staging gets amber.
[[kubernetes.contexts]]
context_pattern = '.*prod.*'
style = 'bold danger'

[[kubernetes.contexts]]
context_pattern = '.*staging.*'
style = 'warn'

[cmd_duration]
min_time = 2000
format = '[ \[$duration\]]($style)'
style = 'dimmed danger'

[time]
format = '[ \[$time\]]($style)'
disabled = false
style = 'dimmed muted'
time_format = '%r'

[conda]
format = '[$symbol$environment ]($style)'
style = 'dimmed bright-green'

# Shows whether the .envrc in scope is active ("on") or present-but-unloaded.
[direnv]
disabled = false
format = '[\(direnv:$loaded\)]($style) '
loaded_msg = 'on'
unloaded_msg = 'off'
style = 'muted'

[username]
format = '[$user]($style)'

[hostname]
ssh_only = true
format = '@[$hostname]($style) '
style = 'host'

[shlvl]
disabled = false
threshold = 3
format = '[$symbol$shlvl]($style) '
symbol = 'ÔćĽ'
style = 'bold warn'

[sudo]
disabled = false
format = '[sudo]($style) '
style = 'bold warn'

[status]
disabled = false
format = '[$symbol$status( $signal_name)]($style) '
symbol = 'Ôťś '
style = 'bold danger'

[git_branch]
format = '[$symbol$branch(:$remote_branch)]($style) '
style = 'vcs'
symbol = ''

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
conflicted = '[K](red)'
ahead = '[Ôçí](green)'
behind = '[Ôçú](red)'
diverged = '[ÔçĽ](bright-yellow)'
up_to_date = '[]()'
untracked = '[?](muted)'
modified = '[!](purple)'
staged = '[+](green)'
renamed = '[┬╗](cyan)'
deleted = '[Ôťś](bright-red)'
style = ''
